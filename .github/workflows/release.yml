name: Release DMG

# Push a version tag (e.g. v1.2) and this builds the .dmg on a macOS runner and
# publishes it as a GitHub Release automatically. Public repos get macOS CI free.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the Release

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SIGN_ID=- VERSION="$VERSION" ./menubar/compile_dmg.sh

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            "menubar/TheLongRun-${VERSION}.dmg" \
            --title "The Long Run ${GITHUB_REF_NAME}" \
            --notes "Open the .dmg, drag TheLongRun to Applications, then grant Input Monitoring + Accessibility on first launch. This build is self-signed and not notarized — on first open, right-click the app and choose Open to get past Gatekeeper."
